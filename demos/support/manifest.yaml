section:
  patterns:
    - "^##\\s+(.+)$"
    - "^###\\s+(.+)$"
    - "^(\\d+\\.\\d+(?:\\.\\d+)?)\\s+[A-Z]"
  format_default: "{short} § {n}"
  format_overrides: {}
  normalizer_overrides: {}

guard:
  corpus_doc_id: null
  ui_markers:
    - "let me connect you"
    - "human agent"
    - "escalat"
    - "billing team"
    - "legal team"
  ui_banner: "Conversation routed to a human agent."

refusal:
  ui_markers:
    - "cannot share"
    - "not covered in our help center"
    - "outside what i can help with"
    - "i don't have info"
    - "not available in"
    - "confidential"
  ui_banner: "Outside the support knowledge base — routed to a human agent."

doc_visibility:
  # public — surfaces to customers by default
  BILLING_REFUNDS_V2: public
  BILLING_REFUNDS_V3: public
  SUBSCRIPTION_CHANGES: public
  PLANS_AND_PRICING: public
  SSO_SETUP: public
  API_RATE_LIMITS: public
  DATA_EXPORT: public
  SLA_UPTIME: public
  ENTERPRISE_SLA_ADDENDUM: public
