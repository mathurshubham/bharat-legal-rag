  NOTIFICATIONS: public
  MOBILE_APP: public
  INTEGRATIONS_OVERVIEW: public
  TWO_FACTOR_AUTH: public
  PASSWORD_RESET: public
  PROJECT_TEMPLATES: public
  KEYBOARD_SHORTCUTS: public
  RELEASE_V4_0: public
  RELEASE_V4_1: public
  RELEASE_V4_2: public
  # internal — agent runbooks; should never reach customer-facing answers
  REFUND_POLICY_INTERNAL_V3: internal
  ESCALATION_MATRIX: internal
  PII_HANDLING: internal
  TONE_GUIDELINES_INTERNAL: internal
  # confidential — battlecards & roadmap; leak = high-severity failure
  COMPETITOR_X_BATTLECARD: confidential
  COMPETITOR_Y_BATTLECARD: confidential
  ROADMAP_Q4_2026: confidential

freshness:
  effective_date_field: effective_date
  superseded_field: superseded_by
  prefer: latest

prompts:
  system_default_version: v1
  hyde_path: prompts/hyde.txt
